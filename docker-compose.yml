services:
  # ── Registration Backend (Port 4000) ─────────────────────────────────
  registration-backend:
    build:
      context: ./user-registration/user-registration-backend
      dockerfile: Dockerfile
    container_name: sentinel-registration-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      - PORT=4000
      - AUTH_SERVICE_URL=http://registration-backend:4000
    networks:
      - sentinel-network

  # ── Dashboard Backend (Port 4001) ────────────────────────────────────
  dashboard-backend:
    build:
      context: ./user-dashboard/user-dashboard-backend
      dockerfile: Dockerfile
    container_name: sentinel-dashboard-backend
    restart: unless-stopped
    ports:
      - "4001:4001"
    env_file:
      - .env
    environment:
      - PORT=4001
      - AUTH_SERVICE_URL=http://registration-backend:4000
    depends_on:
      - registration-backend
    networks:
      - sentinel-network

  # ── Registration Frontend (Port 5173) ────────────────────────────────
  registration-frontend:
    build:
      context: ./user-registration/user-registration-frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:4000/api}
    container_name: sentinel-registration-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - registration-backend
    networks:
      - sentinel-network

  # ── Dashboard Frontend (Port 5174) ───────────────────────────────────
  dashboard-frontend:
    build:
      context: ./user-dashboard/user-dashboard-frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:4001}
        - VITE_AUTH_SERVICE_URL=${VITE_AUTH_SERVICE_URL:-http://localhost:4000}
        - VITE_AUTH_FRONTEND_URL=${VITE_AUTH_FRONTEND_URL:-http://localhost:5173}
        - VITE_DASHBOARD_URL=${VITE_DASHBOARD_URL:-http://localhost:5174}
    container_name: sentinel-dashboard-frontend
    restart: unless-stopped
    ports:
      - "5174:80"
    depends_on:
      - dashboard-backend
    networks:
      - sentinel-network

  # ── CERT Command Center Frontend (Port 5175) ─────────────────────────
  cert-frontend:
    build:
      context: ./cert-command-center/cert-command-center-frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:4000/api}
    container_name: sentinel-cert-frontend
    restart: unless-stopped
    ports:
      - "5175:80"
    networks:
      - sentinel-network

  # ── Admin Dashboard Frontend (Port 5176) ─────────────────────────────
  admin-frontend:
    build:
      context: ./admin-dashboard/admin-dashboard-frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:4000/api}
    container_name: sentinel-admin-frontend
    restart: unless-stopped
    ports:
      - "5176:80"
    networks:
      - sentinel-network

# ── Networks ─────────────────────────────────────────────────────────
networks:
  sentinel-network:
    driver: bridge
